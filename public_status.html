<!DOCTYPE html>
<html>
<head>
    <title>Public Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 col-md-6">
    <div class="card p-4 shadow">
        <h3>Violation Status</h3>

        <p><strong>Vehicle:</strong> {{ violation.vehicle_number }}</p>
        <p><strong>Violation:</strong> {{ violation.violation_type }}</p>
        <p><strong>Location:</strong> {{ violation.location }}</p>
        <p><strong>Date:</strong> {{ violation.date }}</p>
        <p><strong>Fine:</strong> ₹{{ violation.fine_amount }}</p>
        <p><strong>Payment Status:</strong> {{ violation.payment_status }}</p>
        <p><strong>Tamper Status:</strong> {{ violation.tamper_status }}</p>

    </div>
</div>

</body>
</html>
